name: Tests

on:
  push:
    paths:
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/**"
    paths-ignore:
      - "src/static/**"

  pull_request:
    paths:
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/**"
    paths-ignore:
      - "src/static/**"

jobs:
  pytest:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: src
        run: |
          python -m pytest -q