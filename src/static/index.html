<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LESogram</title>

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #22c55e;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --danger: #ef4444;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 460px;
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 15px;
    background: #020617;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.login {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.login input,
.input-row input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #020617;
    color: white;
}

.login-actions {
    display: flex;
    gap: 10px;
}

.login button,
.input-row button,
.logout-btn {
    background: var(--accent);
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.logout-btn {
    padding: 6px 10px;
}

.secondary {
    background: #334155;
    color: white;
}

.chat {
    height: 380px;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 85%;
    word-break: break-word;
}

.me {
    align-self: flex-end;
    background: var(--accent);
    color: black;
}

.other {
    align-self: flex-start;
    background: #1f2937;
}

.system {
    align-self: center;
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    padding: 4px 8px;
}

.meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}

.input-row {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid #1f2937;
}

.input-row input {
    flex: 1;
}

.hidden {
    display: none;
}

.status {
    padding: 8px 12px;
    font-size: 13px;
    color: var(--muted);
    border-top: 1px solid #1f2937;
}

.error {
    color: var(--danger);
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>💬 LESogram</span>
        <button id="logoutBtn" class="logout-btn hidden" onclick="logout()">Exit</button>
    </div>

    <div id="login" class="login">
        <input id="username" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <input id="room" placeholder="Room" />

        <div class="login-actions">
            <button onclick="auth('login')">Login</button>
            <button class="secondary" onclick="auth('register')">Register</button>
        </div>

        <div id="authStatus" class="status"></div>
    </div>

    <div id="chatUI" class="hidden">
        <div id="chat" class="chat"></div>

        <div class="input-row">
            <input id="message" placeholder="Type message..."
                   onkeydown="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()">➤</button>
        </div>

        <div id="chatStatus" class="status">Disconnected</div>
    </div>
</div>

<script>
let ws = null;
let currentUser = null;
let currentRoom = null;
let token = localStorage.getItem("token") || "";

function setStatus(text, isError = false, target = "authStatus") {
    const el = document.getElementById(target);
    el.textContent = text;
    el.className = "status" + (isError ? " error" : "");
}

function formatTime(isoString) {
    if (!isoString) return "";
    const date = new Date(isoString);
    return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function addMessage(payload) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");

    if (payload.type === "system") {
        div.className = "msg system";
        div.innerText = payload.text;
    } else {
        const isMe = payload.username === currentUser;
        div.className = "msg " + (isMe ? "me" : "other");

        const content = document.createElement("div");
        content.innerText = `${payload.username}: ${payload.text}`;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerText = formatTime(payload.timestamp);

        div.appendChild(content);
        div.appendChild(meta);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function auth(mode) {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const room = document.getElementById("room").value.trim();

    if (!username || !password || !room) {
        setStatus("Fill all fields", true);
        return;
    }

    currentUser = username;
    currentRoom = room;

    setStatus(mode === "login" ? "Logging in..." : "Registering...");

    try {
        const res = await fetch(`/${mode}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
            setStatus(data.detail || "Auth failed", true);
            return;
        }

        token = data.access_token;
        localStorage.setItem("token", token);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("chatUI").classList.remove("hidden");
        document.getElementById("logoutBtn").classList.remove("hidden");

        document.getElementById("chat").innerHTML = "";

        await loadMessages();
        connectWS();

    } catch (err) {
        setStatus("Network error", true);
    }
}

async function loadMessages() {
    const res = await fetch(`/messages/${encodeURIComponent(currentRoom)}`);
    const messages = await res.json();

    messages.forEach(m => {
        addMessage({
            type: "message",
            username: m.username,
            text: m.text,
            room: m.room,
            timestamp: m.timestamp
        });
    });
}

function connectWS() {
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(
        `${protocol}://${location.host}/ws/${encodeURIComponent(currentRoom)}?token=${encodeURIComponent(token)}&username=${encodeURIComponent(currentUser)}`
    );

    ws.onopen = () => {
        setStatus(`Connected to room: ${currentRoom}`, false, "chatStatus");
    };

    ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        addMessage(payload);
    };

    ws.onclose = () => {
        setStatus("Disconnected", true, "chatStatus");
    };

    ws.onerror = () => {
        setStatus("WebSocket error", true, "chatStatus");
    };
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ text }));
    input.value = "";
}

function logout() {
    if (ws) {
        ws.close();
        ws = null;
    }

    localStorage.removeItem("token");
    token = "";
    currentUser = null;
    currentRoom = null;

    document.getElementById("chatUI").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("logoutBtn").classList.add("hidden");
    document.getElementById("chat").innerHTML = "";
    setStatus("Logged out");
}
</script>

</body>
</html>
