<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Chat</title>

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #22c55e;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* контейнер */
.container {
    width: 420px;
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* header */
.header {
    padding: 15px;
    background: #020617;
    font-weight: bold;
}

/* login */
.login {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.login input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #020617;
    color: white;
}

.login button {
    background: var(--accent);
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* chat */
.chat {
    height: 320px;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* messages */
.msg {
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 80%;
}

.me {
    align-self: flex-end;
    background: var(--accent);
    color: black;
}

.other {
    align-self: flex-start;
    background: #1f2937;
}

.system {
    align-self: center;
    font-size: 12px;
    color: var(--muted);
}

/* input */
.input-row {
    display: flex;
    border-top: 1px solid #1f2937;
}

.input-row input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #020617;
    color: white;
}

.input-row button {
    background: var(--accent);
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

/* utility */
.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<div class="header">💬 Realtime Chat</div>

<!-- LOGIN -->
<div id="login" class="login">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <input id="room" placeholder="Room">
    <button onclick="connect()">Enter Chat</button>
</div>

<!-- CHAT -->
<div id="chatUI" class="hidden">
    <div id="chat" class="chat"></div>

    <div class="input-row">
        <input id="message" placeholder="Type message..."
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

</div>

<script>
let ws;
let currentUser;

// добавление сообщения
function addMessage(text, type="other") {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// подключение
async function connect() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const room = document.getElementById("room").value;

    if (!username || !password || !room) {
        alert("Fill all fields");
        return;
    }

    currentUser = username;

    // логин
    const res = await fetch(`/login?username=${username}&password=${password}`, {
        method: "POST"
    });

    const data = await res.json();

    if (!data.access_token) {
        alert("Login failed");
        return;
    }

    const token = data.access_token;
    localStorage.setItem("token", token);

    // скрыть login
    document.getElementById("login").classList.add("hidden");
    document.getElementById("chatUI").classList.remove("hidden");

    // загрузка истории
    fetch(`/messages/${room}`)
        .then(r => r.json())
        .then(messages => {
            messages.forEach(m => {
                addMessage(
                    `${m.username}: ${m.text}`,
                    m.username === currentUser ? "me" : "other"
                );
            });
        });

    // WebSocket
    ws = new WebSocket(`ws://${location.host}/ws/${room}/${username}?token=${token}`);

    ws.onmessage = (event) => {
        const text = event.data;

        if (text.includes("joined") || text.includes("left")) {
            addMessage(text, "system");
            return;
        }

        const isMe = text.startsWith(currentUser + ":");
        addMessage(text, isMe ? "me" : "other");
    };
}

// отправка сообщения
function sendMessage() {
    const input = document.getElementById("message");

    if (!input.value) return;

    ws.send(input.value);
    input.value = "";
}
</script>

</body>
</html>
