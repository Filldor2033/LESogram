<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Realtime Chat</title>
<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #22c55e;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --danger: #ef4444;
}
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
}

.container {
    width: 780px;
    max-width: 100%;
    height: calc(100vh - 48px);
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
}

.panel, .chat-panel {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    min-height: 0;
}

.panel {
    display: flex;
    flex-direction: column;
}

.chat-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.header {
    background: #020617;
    padding: 14px 16px;
    font-weight: bold;
    flex-shrink: 0;
}

.section {
    padding: 16px;
}

#roomsSection {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
}

#roomsList {
    overflow-y: auto;
}

input, button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

input {
    background: #020617;
    color: white;
    margin-bottom: 10px;
}

button {
    background: var(--accent);
    cursor: pointer;
    font-weight: bold;
}

.secondary {
    background: #334155;
    color: white;
}

.status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
}

.error {
    color: var(--danger);
}

.room-item {
    background: #0b1220;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.room-title {
    font-weight: bold;
}

.room-meta {
    font-size: 12px;
    color: var(--muted);
    margin: 6px 0 10px;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
}

.msg {
    max-width: 80%;
    padding: 10px 12px;
    border-radius: 12px;
    word-break: break-word;
}

.me {
    align-self: flex-end;
    background: var(--accent);
    color: black;
}

.other {
    align-self: flex-start;
    background: #1f2937;
}

.system {
    align-self: center;
    color: var(--muted);
    font-size: 12px;
}

.meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}

.input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #1f2937;
    flex-shrink: 0;
}

.input-row input {
    margin: 0;
    flex: 1;
}

.hidden {
    display: none;
}

.topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}

.small-btn {
    width: auto;
    padding: 8px 12px;
}
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="header">Аккаунт и комнаты</div>

        <div class="section" id="authSection">
            <input id="username" placeholder="Username" />
            <input id="password" type="password" placeholder="Password" />
            <button onclick="auth('login')">Login</button>
            <div style="height:8px"></div>
            <button class="secondary" onclick="auth('register')">Register</button>
            <div id="authStatus" class="status"></div>
        </div>

        <div class="section hidden" id="roomsSection">
            <div class="topbar">
                <div><b id="whoami"></b></div>
                <button class="secondary small-btn" onclick="logout()">Exit</button>
            </div>

            <hr style="border-color:#1f2937; opacity:.4; margin:16px 0">

            <input id="newRoomName" placeholder="New room name" />
            <input id="newRoomPassword" type="password" placeholder="Room password" />
            <button onclick="createRoom()">Create room</button>

            <div id="roomStatus" class="status"></div>

            <hr style="border-color:#1f2937; opacity:.4; margin:16px 0">

            <button class="secondary" onclick="loadRooms()">Refresh rooms</button>
            <div style="height:10px"></div>
            <div id="roomsList"></div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="header" id="chatHeader">Чат не выбран</div>
        <div id="chat" class="chat"></div>
        <div class="input-row">
            <input id="message" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button style="width:120px" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
let token = localStorage.getItem("token") || "";
let currentUser = localStorage.getItem("username") || "";
let currentRoom = "";
let currentRoomToken = "";
let ws = null;

function setStatus(id, text, isError=false) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "status" + (isError ? " error" : "");
}

function authHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    };
}

function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
}

function addMessage(payload) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");

    if (payload.type === "system") {
        div.className = "msg system";
        div.innerText = payload.text;
    } else {
        const mine = payload.username === currentUser;
        div.className = "msg " + (mine ? "me" : "other");

        const text = document.createElement("div");
        text.innerText = `${payload.username}: ${payload.text}`;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerText = formatTime(payload.timestamp);

        div.appendChild(text);
        div.appendChild(meta);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
}

async function auth(mode) {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        setStatus("authStatus", "Fill username and password", true);
        return;
    }

    const res = await fetch(`/${mode}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("authStatus", data.detail || "Auth failed", true);
        return;
    }

    token = data.access_token;
    currentUser = username;

    localStorage.setItem("token", token);
    localStorage.setItem("username", username);

    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("roomsSection").classList.remove("hidden");
    document.getElementById("whoami").innerText = username;

    setStatus("authStatus", "");
    await loadRooms();
}

async function loadRooms() {
    const res = await fetch("/rooms", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const list = document.getElementById("roomsList");
    list.innerHTML = "";

    if (!res.ok) {
        setStatus("roomStatus", data.detail || "Cannot load rooms", true);
        return;
    }

    if (!data.length) {
        list.innerHTML = `<div class="status">No rooms yet</div>`;
        return;
    }

    for (const room of data) {
        const item = document.createElement("div");
        item.className = "room-item";
        item.innerHTML = `
            <div class="room-title">${room.name}</div>
            <div class="room-meta">
                creator: ${room.created_by}<br>
                online: ${room.online}
            </div>
            <input type="password" placeholder="Room password" id="pwd_${room.name}">
            <button onclick="joinRoom('${room.name}')">Join</button>
        `;
        list.appendChild(item);
    }
}

async function createRoom() {
    const name = document.getElementById("newRoomName").value.trim();
    const password = document.getElementById("newRoomPassword").value.trim();

    if (!name || !password) {
        setStatus("roomStatus", "Fill room name and password", true);
        return;
    }

    const res = await fetch("/rooms", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ name, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", data.detail || "Cannot create room", true);
        return;
    }

    setStatus("roomStatus", `Room "${name}" created`);
    document.getElementById("newRoomName").value = "";
    document.getElementById("newRoomPassword").value = "";
    await loadRooms();
}

async function joinRoom(roomName) {
    const pwdInput = document.getElementById(`pwd_${roomName}`);
    const password = pwdInput.value.trim();

    if (!password) {
        setStatus("roomStatus", "Enter room password", true);
        return;
    }

    const res = await fetch("/rooms/join", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ room: roomName, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", data.detail || "Cannot join room", true);
        return;
    }

    currentRoom = roomName;
    currentRoomToken = data.room_token;
    document.getElementById("chatHeader").innerText = `Комната: ${roomName}`;

    clearChat();
    await loadMessages();
    connectWS();
    setStatus("roomStatus", `Joined room "${roomName}"`);
}

async function loadMessages() {
    const res = await fetch(`/messages/${encodeURIComponent(currentRoom)}?room_token=${encodeURIComponent(currentRoomToken)}`);
    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", data.detail || "Cannot load messages", true);
        return;
    }

    for (const m of data) {
        addMessage({
            type: "message",
            username: m.username,
            text: m.text,
            timestamp: m.timestamp
        });
    }
}

function connectWS() {
    if (ws) {
        ws.close();
    }

    const protocol = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(
        `${protocol}://${location.host}/ws/${encodeURIComponent(currentRoom)}?room_token=${encodeURIComponent(currentRoomToken)}`
    );

    ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        addMessage(payload);
    };
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ text }));
    input.value = "";
}

function logout() {
    if (ws) ws.close();
    ws = null;
    token = "";
    currentUser = "";
    currentRoom = "";
    currentRoomToken = "";

    localStorage.removeItem("token");
    localStorage.removeItem("username");

    document.getElementById("authSection").classList.remove("hidden");
    document.getElementById("roomsSection").classList.add("hidden");
    document.getElementById("chatHeader").innerText = "Чат не выбран";
    clearChat();
}
</script>

</body>
</html>
