<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LESogram</title>
<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --card-2: #0b1220;
    --panel: #020617;
    --accent: #22c55e;
    --accent-2: #16a34a;
    --accent-line: rgba(34, 197, 94, 0.26);
    --text: #e5e7eb;
    --muted: #9ca3af;
    --muted-2: #cbd5e1;
    --danger: #ef4444;
    --border: #1f2937;
    --shadow: 0 18px 45px rgba(2, 6, 23, 0.42);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    background:
        radial-gradient(circle at top right, rgba(34,197,94,0.16), transparent 24%),
        radial-gradient(circle at 15% 18%, rgba(59,130,246,0.10), transparent 26%),
        radial-gradient(circle at bottom left, rgba(16,185,129,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%),
        var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
}

.container {
    width: min(1180px, 100%);
    height: calc(100vh - 48px);
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    gap: 16px;
}

.panel, .chat-panel {
    background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 26%),
        rgba(17,24,39,0.96);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid rgba(148,163,184,0.10);
    backdrop-filter: blur(14px);
    min-height: 0;
}

.panel {
    display: flex;
    flex-direction: column;
}

.chat-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.header {
    background:
        linear-gradient(90deg, rgba(34,197,94,0.08), transparent 28%),
        rgba(2,6,23,0.92);
    padding: 16px 18px;
    font-weight: bold;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(148,163,184,0.08);
}

.header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
}

.section {
    padding: 18px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-mark {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, #86efac, var(--accent));
    box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.08);
    flex-shrink: 0;
}

.brand-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.brand-title {
    font-size: 17px;
    letter-spacing: 0.02em;
}

.brand-subtitle {
    font-size: 12px;
    font-weight: normal;
    color: var(--muted);
}

.lang-switch {
    display: inline-flex;
    padding: 4px;
    border-radius: 999px;
    background: rgba(148,163,184,0.10);
    border: 1px solid rgba(148,163,184,0.08);
    gap: 4px;
}

.lang-btn {
    width: auto;
    min-width: 52px;
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    background: transparent;
    color: var(--muted-2);
    box-shadow: none;
    font-size: 12px;
    letter-spacing: 0.06em;
}

.lang-btn:hover {
    box-shadow: none;
}

.lang-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #04120a;
    box-shadow: 0 10px 20px rgba(22, 163, 74, 0.20);
}

.section-block {
    padding: 14px;
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(2,6,23,0.20));
    border: 1px solid rgba(148,163,184,0.08);
}

.section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
}

.section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
}

.section-pill {
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted-2);
    background: rgba(148,163,184,0.08);
    border: 1px solid rgba(148,163,184,0.08);
}

#roomsSection {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
}

#roomsList {
    overflow-y: auto;
}

input, button, select {
    width: 100%;
    padding: 11px 13px;
    border-radius: 12px;
    border: 1px solid transparent;
    font: inherit;
}

input, select {
    background: var(--panel);
    color: white;
    margin-bottom: 10px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

input::placeholder {
    color: #7c8aa1;
}

input:focus,
select:focus {
    outline: none;
    border-color: var(--accent-line);
    box-shadow: 0 0 0 4px rgba(34,197,94,0.10);
}

button {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #04120a;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 10px 24px rgba(22, 163, 74, 0.18);
    transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 28px rgba(22, 163, 74, 0.24);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.secondary {
    background: linear-gradient(180deg, #3a475c, #334155);
    color: white;
    box-shadow: none;
}

.status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 18px;
}

.error {
    color: var(--danger);
}

.room-item {
    background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 60%),
        var(--card-2);
    padding: 13px;
    border-radius: 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(148,163,184,0.08);
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
}

.room-item:hover {
    transform: translateY(-1px);
    border-color: rgba(34,197,94,0.18);
    box-shadow: 0 10px 24px rgba(2, 6, 23, 0.24);
}

.room-title {
    font-weight: bold;
    font-size: 15px;
}

.room-meta {
    font-size: 12px;
    color: var(--muted);
    margin: 6px 0 10px;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
    background:
        radial-gradient(circle at top center, rgba(34,197,94,0.06), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 16%);
}

.msg {
    max-width: min(80%, 560px);
    padding: 13px 14px;
    border-radius: 18px;
    word-break: break-word;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 12px 28px rgba(2, 6, 23, 0.18);
}

.me {
    align-self: flex-end;
    background: linear-gradient(135deg, #22c55e, #84cc16);
    color: #05140b;
    border-bottom-right-radius: 6px;
}

.other {
    align-self: flex-start;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), #1f2937);
    color: var(--text);
    border: 1px solid rgba(148,163,184,0.06);
    border-bottom-left-radius: 6px;
}

.system {
    align-self: center;
    color: var(--muted);
    font-size: 12px;
    background: rgba(148,163,184,0.08);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.08);
    box-shadow: none;
}

.msg-username {
    font-size: 12px;
    font-weight: bold;
    opacity: 0.92;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.msg-text {
    white-space: pre-wrap;
    line-height: 1.45;
}

.msg-media {
    width: min(340px, 100%);
    border-radius: 14px;
    overflow: hidden;
    background: rgba(2,6,23,0.22);
    border: 1px solid rgba(148,163,184,0.08);
}

.msg-media img,
.msg-media video {
    display: block;
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    background: #000;
}

.msg-file {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(2,6,23,0.22);
    border: 1px solid rgba(148,163,184,0.08);
}

.msg-file-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
}

.msg-file-name {
    font-weight: bold;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.msg-file-meta {
    font-size: 12px;
    opacity: 0.8;
}

.file-link {
    width: auto;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    color: inherit;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    transition: background 0.15s ease;
}

.file-link:hover {
    background: rgba(255,255,255,0.18);
}

.meta {
    font-size: 11px;
    color: var(--muted);
}

.me .meta,
.me .msg-username {
    color: rgba(5,20,11,0.76);
}

.composer {
    border-top: 1px solid var(--border);
    padding: 14px;
    flex-shrink: 0;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 60%),
        rgba(2,6,23,0.56);
}

.composer-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}

.tool-btn {
    width: auto;
    padding: 9px 12px;
}

.input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
}

.input-row input {
    margin: 0;
    flex: 1;
}

.composer-status {
    margin-top: 10px;
}

.hidden {
    display: none !important;
}

.topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}

.small-btn {
    width: auto;
    padding: 8px 12px;
}

.rooms-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.rooms-list-title {
    font-weight: bold;
}

.chat-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}

.chat-room-label {
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-room-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 5px rgba(34,197,94,0.10);
    flex-shrink: 0;
}

.chat-room-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.chat-room-copy small {
    color: var(--muted);
    font-size: 12px;
    font-weight: normal;
}

.filters {
    display: grid;
    gap: 8px;
    margin-bottom: 12px;
}

.filters-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.chat-empty {
    margin: auto 0;
    padding: 22px 18px;
    border-radius: 20px;
    border: 1px dashed rgba(148,163,184,0.16);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(2,6,23,0.16));
    text-align: center;
    color: var(--muted);
}

.chat-empty-title {
    color: var(--text);
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
}

.chat-empty-text {
    line-height: 1.5;
    max-width: 380px;
    margin: 0 auto;
}

@media (max-width: 1200px) {
    body {
        padding: 16px;
    }

    .container {
        height: calc(100vh - 32px);
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 12px;
    }
}

@media (max-width: 900px) {
    body {
        padding: 12px;
        overflow-y: auto;
    }

    .container {
        height: calc(100vh - 24px);
        grid-template-columns: 1fr;
        grid-template-rows: minmax(280px, 42vh) minmax(0, 1fr);
        gap: 10px;
    }

    .panel,
    .chat-panel {
        border-radius: 18px;
    }

    .msg {
        max-width: 92%;
    }
}

@media (max-width: 600px) {
    body {
        padding: 8px;
    }

    .filters-row {
        grid-template-columns: 1fr;
        display: grid;
    }

    .container {
        min-height: calc(100vh - 16px);
        height: auto;
        grid-template-rows: auto minmax(360px, 1fr);
        gap: 8px;
    }

    .header,
    .section,
    .composer {
        padding: 12px;
    }

    .header-row,
    .topbar,
    .chat-topbar,
    .composer-tools,
    .input-row {
        flex-wrap: wrap;
        align-items: flex-start;
    }

    .lang-switch,
    .input-row button,
    .tool-btn {
        width: 100% !important;
    }

    .msg {
        max-width: 100%;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="header">
            <div class="header-row">
                <div class="brand">
                    <div class="brand-mark"></div>
                    <div class="brand-copy">
                        <div class="brand-title">LESogram</div>
                        <div class="brand-subtitle" id="brandSubtitle">Fast rooms, live messages, simple sharing</div>
                    </div>
                </div>
                <div class="lang-switch" aria-label="Language switch">
                    <button id="langEnBtn" class="lang-btn" type="button" onclick="setLanguage('en')">EN</button>
                    <button id="langRuBtn" class="lang-btn" type="button" onclick="setLanguage('ru')">RU</button>
                </div>
            </div>
        </div>

        <div class="section" id="authSection">
            <div class="section-block">
                <div class="section-title" id="authTitle">Account</div>
                <input id="username" placeholder="Username" />
                <input id="password" type="password" placeholder="Password" />
                <button id="loginBtn" onclick="auth('login')">Login</button>
                <div style="height:8px"></div>
                <button id="registerBtn" class="secondary" onclick="auth('register')">Register</button>
                <div id="authStatus" class="status"></div>
            </div>
        </div>

        <div class="section hidden" id="roomsSection">
            <div class="topbar">
                <div><b id="whoami"></b></div>
                <button id="logoutBtn" class="secondary small-btn" onclick="logout()">Exit</button>
            </div>

            <hr style="border-color:#1f2937; opacity:.4; margin:16px 0">

            <div class="section-block">
                <div class="section-title" id="createRoomTitle">Create Room</div>
                <input id="newRoomName" placeholder="New room name" />
                <input id="newRoomPassword" type="password" placeholder="Room password" />
                <button id="createRoomBtn" onclick="createRoom()">Create room</button>
                <div id="roomStatus" class="status"></div>
            </div>

            <hr style="border-color:#1f2937; opacity:.4; margin:16px 0">

            <div class="section-block">
                <div class="section-title-row">
                    <div class="section-title" id="roomListTitle" style="margin-bottom:0">Room List</div>
                    <div class="section-pill" id="roomsCountPill">0 rooms</div>
                </div>
                <div class="rooms-list-header">
                    <div class="rooms-list-title" id="roomListSubtitle">Browse and join</div>
                    <button id="toggleRoomsBtn" class="secondary small-btn" onclick="toggleRoomsList()">Hide list</button>
                </div>
                <div id="roomsListSection">
                    <div class="filters">
                        <input id="roomSearch" placeholder="Search by room name..." oninput="renderRooms()" />
                        <input id="creatorSearch" placeholder="Search by creator..." oninput="renderRooms()" />

                        <div class="filters-row">
                            <select id="onlineFilter" onchange="renderRooms()">
                                <option id="onlineFilterAll" value="all">All rooms</option>
                                <option id="onlineFilterOnline" value="online">Only with online users</option>
                                <option id="onlineFilterEmpty" value="empty">Only empty rooms</option>
                            </select>

                            <select id="sortRooms" onchange="renderRooms()">
                                <option id="sortNameAsc" value="name_asc">Name A-Z</option>
                                <option id="sortNameDesc" value="name_desc">Name Z-A</option>
                                <option id="sortOnlineDesc" value="online_desc">Online first</option>
                                <option id="sortOnlineAsc" value="online_asc">Online last</option>
                                <option id="sortCreatorAsc" value="creator_asc">Creator A-Z</option>
                            </select>
                        </div>

                        <div class="filters-row">
                            <button id="refreshRoomsBtn" class="secondary" onclick="loadRooms()">Refresh rooms</button>
                            <button id="resetFiltersBtn" class="secondary" onclick="resetRoomFilters()">Reset filters</button>
                        </div>
                    </div>
                    <div id="roomsList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="header">
            <div class="chat-topbar">
                <div class="chat-room-label">
                    <div class="chat-room-dot"></div>
                    <div class="chat-room-copy">
                        <span id="chatHeader">Chat not selected</span>
                        <small id="chatSubheader">Choose a room to start chatting</small>
                    </div>
                </div>
                <button id="leaveChatBtn" class="secondary small-btn hidden" onclick="leaveChat()">Exit chat</button>
            </div>
        </div>
        <div id="chat" class="chat"></div>
        <div class="composer">
            <div class="composer-tools">
                <button id="pickMediaBtn" class="secondary tool-btn" onclick="pickMedia()">Photo or video</button>
                <button id="pickFileBtn" class="secondary tool-btn" onclick="pickFile()">File</button>
            </div>
            <div class="input-row">
                <input id="message" placeholder="Type a message or add a caption..." onkeydown="handleComposerKey(event)" />
                <button id="sendBtn" style="width:120px" onclick="sendMessage()">Send</button>
            </div>
            <div id="composerStatus" class="status composer-status"></div>
            <input id="mediaInput" class="hidden" type="file" accept="image/*,video/*" onchange="handleAttachmentSelect(event)" />
            <input id="fileInput" class="hidden" type="file" onchange="handleAttachmentSelect(event)" />
        </div>
    </div>
</div>

        roomListTitle: "Список комнат",

const API_DETAIL_MAP = {
    "Missing token": "apiMissingToken",
    "Invalid token": "apiInvalidToken",
    "User already exists": "apiUserExists",
    "Invalid credentials": "apiInvalidCredentials",
    "Room already exists": "apiRoomExists",
    "Room not found": "apiRoomNotFound",
    "Wrong room password": "apiWrongRoomPassword",
    "No access to this room": "apiNoRoomAccess",
    "Attachment is missing a file name": "apiAttachmentMissingName",
    "GIF uploads are disabled": "apiGifDisabled",
    "Attachment is empty": "apiAttachmentEmpty",
    "Message cannot be empty": "apiMessageEmpty"
};

let token = localStorage.getItem("token") || "";
let currentUser = localStorage.getItem("username") || "";
let currentRoom = "";
let currentRoomToken = "";
let ws = null;
let roomsListCollapsed = false;

let currentLanguage = getInitialLanguage();

function getInitialLanguage() {
    const saved = localStorage.getItem("language");
    if (saved === "en" || saved === "ru") {
        return saved;
    }
    return navigator.language && navigator.language.toLowerCase().startsWith("ru") ? "ru" : "en";
}

function t(key, vars = {}) {
    const source = translations[currentLanguage][key] ?? translations.en[key] ?? key;
    return source.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? `{${name}}`));
}

function pluralizeRu(count, one, few, many) {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return one;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
    return many;
}

function formatRoomCount(count) {
    if (currentLanguage === "ru") {
        const form = pluralizeRu(count, t("roomCount_one", { count }), t("roomCount_few", { count }), t("roomCount_many", { count }));
        return form;
    }
    return count === 1 ? t("roomCount_one", { count }) : t("roomCount_many", { count });
}

function translateApiDetail(detail) {
    if (!detail) return "";
    if (typeof detail !== "string") return "";

    if (API_DETAIL_MAP[detail]) {
        return t(API_DETAIL_MAP[detail]);
    }

    let match = detail.match(/^Attachment is too large\. Max size is (\d+) MB$/);
    if (match) {
        return t("apiAttachmentTooLarge", { size: match[1] });
    }

    match = detail.match(/^Message must be at most (\d+) characters$/);
    if (match) {
        return t("apiMessageTooLong", { max: match[1] });
    }

    return detail;
}

function getApiErrorMessage(data, fallbackKey) {
    const translated = translateApiDetail(data?.detail);
    return translated || t(fallbackKey);
}

function setLanguage(language) {
    if (!translations[language]) return;
    currentLanguage = language;
    localStorage.setItem("language", language);
    applyTranslations();
}

function setButtonText(id, key, vars = {}) {
    const el = document.getElementById(id);
    if (el) {
        el.textContent = t(key, vars);

}

function setInputPlaceholder(id, key) {

function renderChatEmptyState() {

function toggleChatEmptyState() {

    const hasRealMessages = Array.from(chat.children).some(node => node.id !== "chatEmptyState");

function setStatus(id, text, isError = false) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || "";
    el.className = "status" + (isError ? " error" : "");
}

function setComposerStatus(text, isError = false) {
    setStatus("composerStatus", text, isError);
}

function authHeaders(options = {}) {
    const headers = {
        "Authorization": "Bearer " + token
    };

    if (options.json !== false) {
        headers["Content-Type"] = "application/json";
    }

    return headers;
}

function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const locale = currentLanguage === "ru" ? "ru-RU" : "en-US";
    return d.toLocaleTimeString(locale, { hour: "2-digit", minute: "2-digit" });
}

function formatBytes(bytes) {
    const size = Number(bytes || 0);
    if (!size) return "";

    const units = ["B", "KB", "MB", "GB"];
    let value = size;
    let unit = units[0];

    for (let i = 0; i < units.length; i++) {
        unit = units[i];
        if (value < 1024 || i === units.length - 1) break;
        value /= 1024;
    }

    return `${value >= 10 ? value.toFixed(0) : value.toFixed(1)} ${unit}`;
}

function getMessageType(payload) {
    return payload.content_type || "text";
}

function buildAttachmentNode(payload) {
    const contentType = getMessageType(payload);

    if (!payload.media_url || contentType === "text") {
        return null;
    }

    if (contentType === "image" || contentType === "gif") {
        const media = document.createElement("div");
        media.className = "msg-media";

        const img = document.createElement("img");
        img.src = payload.media_url;
        img.alt = payload.file_name || t("attachmentLabel");
        img.loading = "lazy";

        media.appendChild(img);
        return media;
    }

    if (contentType === "video") {
        const media = document.createElement("div");
        media.className = "msg-media";

        const video = document.createElement("video");
        video.src = payload.media_url;
        video.controls = true;
        video.preload = "metadata";

        media.appendChild(video);
        return media;
    }

    const fileBox = document.createElement("div");
    fileBox.className = "msg-file";

    const info = document.createElement("div");
    info.className = "msg-file-info";

    const name = document.createElement("div");
    name.className = "msg-file-name";
    name.textContent = payload.file_name || t("attachmentLabel");

    const meta = document.createElement("div");
    meta.className = "msg-file-meta";
    const metaParts = [];
    if (payload.mime_type) metaParts.push(payload.mime_type);
    if (payload.file_size) metaParts.push(formatBytes(payload.file_size));
    meta.textContent = metaParts.join(" • ") || t("fileLabel");

    const link = document.createElement("a");
    link.className = "file-link";
    link.dataset.i18nKey = "download";
    link.href = payload.media_url;
    link.textContent = t("download");
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    if (payload.file_name) {
        link.download = payload.file_name;
    }

    info.appendChild(name);
    info.appendChild(meta);
    fileBox.appendChild(info);
    fileBox.appendChild(link);
    return fileBox;
}

function getSystemMessageText(payload) {
    const actor = payload.system_actor || payload.username || "";
    if (payload.system_event === "joined") {
        return t("systemJoined", { user: actor });
    }
    if (payload.system_event === "left") {
        return t("systemLeft", { user: actor });
    }
    return payload.text || "";
}

function addMessage(payload) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");

    if (payload.type === "system") {
        div.className = "msg system";
        if (payload.system_event) {
            div.dataset.systemEvent = payload.system_event;
        }
        if (payload.system_actor) {
            div.dataset.systemActor = payload.system_actor;
        }
        div.innerText = getSystemMessageText(payload);
        chat.appendChild(div);
        toggleChatEmptyState();
        chat.scrollTop = chat.scrollHeight;
        return;
    }

    const mine = payload.username === currentUser;
    div.className = "msg " + (mine ? "me" : "other");

    const username = document.createElement("div");
    username.className = "msg-username";
    username.textContent = payload.username;

    const attachmentNode = buildAttachmentNode(payload);
    const hasText = Boolean((payload.text || "").trim());

    div.appendChild(username);

    if (attachmentNode) {
        div.appendChild(attachmentNode);
    }

    if (hasText) {
        const text = document.createElement("div");
        text.className = "msg-text";
        text.textContent = payload.text;
        div.appendChild(text);
    }

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerText = formatTime(payload.timestamp);
    div.appendChild(meta);

    chat.appendChild(div);
    toggleChatEmptyState();
    chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
    renderChatEmptyState();
    toggleChatEmptyState();
}

function setRoomsListCollapsed(collapsed) {
    roomsListCollapsed = collapsed;

    const roomsListSection = document.getElementById("roomsListSection");
    const toggleButton = document.getElementById("toggleRoomsBtn");

    roomsListSection.classList.toggle("hidden", collapsed);
    toggleButton.textContent = collapsed ? t("showList") : t("hideList");
}

function toggleRoomsList() {
    setRoomsListCollapsed(!roomsListCollapsed);
}

function showLoggedInState() {
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("roomsSection").classList.remove("hidden");
    document.getElementById("whoami").innerText = currentUser;
}

function showLoggedOutState() {
    document.getElementById("authSection").classList.remove("hidden");
    document.getElementById("roomsSection").classList.add("hidden");
}

async function auth(mode) {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        setStatus("authStatus", t("authFill"), true);
        return;
    }

    const res = await fetch(`/${mode}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("authStatus", getApiErrorMessage(data, "authFailed"), true);
        return;
    }

    token = data.access_token;
    currentUser = username;

    localStorage.setItem("token", token);
    localStorage.setItem("username", username);

    showLoggedInState();
    setStatus("authStatus", "");
    await loadRooms();
}

async function loadRooms() {
    const res = await fetch("/rooms", {
        headers: authHeaders({ json: false })
    });

    const data = await res.json();

    if (!res.ok) {
        if (res.status === 401) {
            logout();
            setStatus("authStatus", t("sessionExpired"), true);
            return false;
        }
        setStatus("roomStatus", getApiErrorMessage(data, "cannotLoadRooms"), true);
        return false;
    }

    allRooms = data;
    updateRoomsCount();
    renderRooms();
    return true;
}

function getFilteredRooms() {
    const roomSearch = document.getElementById("roomSearch")?.value.trim().toLowerCase() || "";
    const creatorSearch = document.getElementById("creatorSearch")?.value.trim().toLowerCase() || "";
    const onlineFilter = document.getElementById("onlineFilter")?.value || "all";
    const sortMode = document.getElementById("sortRooms")?.value || "name_asc";

    let rooms = [...allRooms];

    if (roomSearch) {
        rooms = rooms.filter(room => room.name.toLowerCase().includes(roomSearch));
    }

    if (creatorSearch) {
        rooms = rooms.filter(room => String(room.created_by).toLowerCase().includes(creatorSearch));
    }

    if (onlineFilter === "online") {
        rooms = rooms.filter(room => Number(room.online) > 0);
    }

    if (onlineFilter === "empty") {
        rooms = rooms.filter(room => Number(room.online) === 0);
    }

    rooms.sort((a, b) => {
        if (sortMode === "name_asc") return a.name.localeCompare(b.name);
        if (sortMode === "name_desc") return b.name.localeCompare(a.name);
        if (sortMode === "online_desc") return Number(b.online) - Number(a.online);
        if (sortMode === "online_asc") return Number(a.online) - Number(b.online);
        if (sortMode === "creator_asc") return String(a.created_by).localeCompare(String(b.created_by));
        return 0;
    });

    return rooms;
}

function renderRooms() {
    const list = document.getElementById("roomsList");
    list.innerHTML = "";

    const rooms = getFilteredRooms();

    if (!allRooms.length) {
        const empty = document.createElement("div");
        empty.className = "status";
        empty.textContent = t("roomsNone");
        list.appendChild(empty);
        return;
    }

    if (!rooms.length) {
        const empty = document.createElement("div");
        empty.className = "status";
        empty.textContent = t("roomsNotFound");
        list.appendChild(empty);
        return;
    }

    for (const room of rooms) {
        const item = document.createElement("div");
        item.className = "room-item";

        const title = document.createElement("div");
        title.className = "room-title";
        title.textContent = room.name;

        const meta = document.createElement("div");
        meta.className = "room-meta";

        const creatorLine = document.createElement("div");
        creatorLine.textContent = `${t("creatorLabel")}: ${room.created_by}`;

        const onlineLine = document.createElement("div");
        onlineLine.textContent = `${t("onlineLabel")}: ${room.online}`;

        const input = document.createElement("input");
        input.type = "password";
        input.placeholder = t("roomPasswordPlaceholder");

        const button = document.createElement("button");
        button.textContent = t("join");
        button.addEventListener("click", () => joinRoom(room.name, input));

        meta.appendChild(creatorLine);
        meta.appendChild(onlineLine);

        item.appendChild(title);
        item.appendChild(meta);
        item.appendChild(input);
        item.appendChild(button);

        list.appendChild(item);
    }
}

function resetRoomFilters() {
    document.getElementById("roomSearch").value = "";
    document.getElementById("creatorSearch").value = "";
    document.getElementById("onlineFilter").value = "all";
    document.getElementById("sortRooms").value = "name_asc";
    renderRooms();
}

async function createRoom() {
    const name = document.getElementById("newRoomName").value.trim();
    const password = document.getElementById("newRoomPassword").value.trim();

    if (!name || !password) {
        setStatus("roomStatus", t("fillRoomData"), true);
        return;
    }

    const res = await fetch("/rooms", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ name, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", getApiErrorMessage(data, "cannotCreateRoom"), true);
        return;
    }

    setStatus("roomStatus", t("roomCreated", { room: name }));
    document.getElementById("newRoomName").value = "";
    document.getElementById("newRoomPassword").value = "";
    await loadRooms();
}

async function joinRoom(roomName, pwdInput) {
    const password = pwdInput.value.trim();

    if (!password) {
        setStatus("roomStatus", t("enterRoomPassword"), true);
        return;
    }

    const res = await fetch("/rooms/join", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ room: roomName, password })
    });

    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", getApiErrorMessage(data, "cannotJoinRoom"), true);
        return;
    }

    currentRoom = roomName;
    currentRoomToken = data.room_token;
    updateChatHeader();
    document.getElementById("leaveChatBtn").classList.remove("hidden");

    clearChat();
    await loadMessages();
    connectWS();
    setRoomsListCollapsed(true);
    setStatus("roomStatus", t("joinedRoom", { room: roomName }));
    setComposerStatus("");
}

async function loadMessages() {
    const res = await fetch(
        `/messages/${encodeURIComponent(currentRoom)}?room_token=${encodeURIComponent(currentRoomToken)}`
    );
    const data = await res.json();

    if (!res.ok) {
        setStatus("roomStatus", getApiErrorMessage(data, "cannotLoadMessages"), true);
        return;
    }

    for (const message of data) {
        addMessage(message);
    }
}

function connectWS() {
    if (ws) {
        ws.close();
    }

    const protocol = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(
        `${protocol}://${location.host}/ws/${encodeURIComponent(currentRoom)}?room_token=${encodeURIComponent(currentRoomToken)}`
    );

    ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        addMessage(payload);
    };

    ws.onclose = () => {
        if (currentRoom) {
            setComposerStatus(t("realtimeClosed"), true);
        }
    };

    ws.onopen = () => {
        setComposerStatus("");
    };
}

function ensureRoomSelected() {
    if (!currentRoom || !currentRoomToken) {
        setComposerStatus(t("joinRoomFirst"), true);
        return false;
    }
    return true;
}

function handleComposerKey(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

function sendMessage() {
    if (!ensureRoomSelected()) return;

    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            setComposerStatus(t("realtimeNotReady"), true);
        }
        return;
    }

    ws.send(JSON.stringify({ text }));
    input.value = "";
    setComposerStatus("");
}

function pickMedia() {
    if (!ensureRoomSelected()) return;
    document.getElementById("mediaInput").click();
}

function pickFile() {
    if (!ensureRoomSelected()) return;
    document.getElementById("fileInput").click();
}

function shouldAppendHttpResponse() {
    return !ws || ws.readyState !== WebSocket.OPEN;
}

async function handleAttachmentSelect(event) {
    const input = event.target;
    const file = input.files?.[0];
    input.value = "";

    if (!file || !ensureRoomSelected()) return;

    const caption = document.getElementById("message").value.trim();
    const formData = new FormData();
    formData.append("room_token", currentRoomToken);
    formData.append("text", caption);
    formData.append("file", file);

    setComposerStatus(t("uploadingFile", { file: file.name }));

    try {
        const res = await fetch(`/rooms/${encodeURIComponent(currentRoom)}/attachments`, {
            method: "POST",
            headers: authHeaders({ json: false }),
            body: formData
        });

        const data = await res.json();

        if (!res.ok) {
            setComposerStatus(getApiErrorMessage(data, "uploadFailed"), true);
            return;
        }

        if (shouldAppendHttpResponse()) {
            addMessage(data);
        }

        document.getElementById("message").value = "";
        setComposerStatus(t("fileSent", { file: file.name }));
    } catch (error) {
        setComposerStatus(t("uploadFailed"), true);
    }
}

function leaveChat() {
    if (ws) {
        ws.close();
        ws = null;
    }

    currentRoom = "";
    currentRoomToken = "";

    updateChatHeader();
    document.getElementById("leaveChatBtn").classList.add("hidden");
    document.getElementById("message").value = "";
    clearChat();
    setRoomsListCollapsed(false);
    setStatus("roomStatus", t("leftRoom"));
    setComposerStatus("");
}

function logout() {
    if (ws) ws.close();
    ws = null;
    token = "";
    currentUser = "";
    currentRoom = "";
    currentRoomToken = "";

    localStorage.removeItem("token");
    localStorage.removeItem("username");

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    updateChatHeader();
    document.getElementById("leaveChatBtn").classList.add("hidden");
    document.getElementById("message").value = "";
    clearChat();
    setRoomsListCollapsed(false);
    setComposerStatus("");
    setStatus("roomStatus", "");
    showLoggedOutState();
}

async function initializeSession() {
    applyTranslations();
    clearChat();

    if (!token || !currentUser) return;

    showLoggedInState();
    await loadRooms();
}

initializeSession();
</script>
